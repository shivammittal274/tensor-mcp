# Tell GitHub's secret-scanner to skip the shared OAuth client config.
#
# These are vendor-intended public clients — Google "Desktop App" client
# secrets, Slack public-app credentials, etc. — that the vendors document
# as safe to ship in client-side / local CLI distributions. Their
# security boundary is the loopback `redirect_uri` (Google) or PKCE
# (Slack), not the secret itself.
#
# Without this allowlist, every commit that touches `_shared/` re-triggers
# push protection and requires an unblock URL click.
paths-ignore:
  - "packages/core/src/services/_shared/**"
