name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
            artifact: tensor-mcp-darwin-arm64
            continue-on-error: false
          - target: darwin-x64
            runner: macos-13
            artifact: tensor-mcp-darwin-x64
            continue-on-error: false
          - target: linux-x64
            runner: ubuntu-24.04
            artifact: tensor-mcp-linux-x64
            continue-on-error: false
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            artifact: tensor-mcp-linux-arm64
            continue-on-error: false
          - target: windows-x64
            runner: windows-latest
            artifact: tensor-mcp-windows-x64.exe
            # Windows ships a BM25-only binary (no onnxruntime native binding).
            # `bun --compile` on win32 has occasionally regressed (Bun #18079);
            # don't fail the whole release if windows-latest hiccups.
            continue-on-error: true
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.continue-on-error }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ matrix.runner }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ matrix.runner }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build ${{ matrix.target }}
        run: bun run scripts/build.ts --target=${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release files
        run: |
          set -euo pipefail
          mkdir -p release
          # actions/download-artifact@v4 puts each upload in its own subdir.
          find artifacts -type f -name 'tensor-mcp-*' -exec cp {} release/ \;
          ls -la release/

      - name: Compute combined SHA256SUMS.txt
        working-directory: release
        run: |
          set -euo pipefail
          : > SHA256SUMS.txt
          for f in tensor-mcp-*; do
            sha256sum "$f" >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt

      - name: Determine prerelease
        id: meta
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/tensor-mcp-*
            release/SHA256SUMS.txt
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          fail_on_unmatched_files: true
          generate_release_notes: true
