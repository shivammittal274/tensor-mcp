name: release

on:
  push:
    tags:
      - 'v*.*.*'

# Single Linux runner cross-compiles every supported target. Bun resolves
# native-binding `require()` paths (e.g. onnxruntime-node's per-arch
# napi-v3/<platform>/<arch>/*.node) using the `--target=` flag, so a
# cross-compiled binary picks the correct native binding. Verified
# empirically against darwin-arm64/x64, linux-x64/arm64, windows-x64 from
# a darwin-arm64 host before adopting this layout.
#
# Why not the matrix-of-5-runners pattern that's idiomatic for native CI?
# tensor-mcp no longer embeds platform-specific dylibs at build time — the
# onnxruntime dylib + model are downloaded on first use from the
# `embeddings-v1` release. Every target is a pure cross-compile from
# identical sources, so any host works.

jobs:
  release:
    name: build + release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build every target
        run: bun run scripts/build.ts --all

      - name: Combined SHA256SUMS.txt
        working-directory: dist
        run: |
          set -euo pipefail
          : > SHA256SUMS.txt
          for f in tensor-mcp-*; do
            # Skip the host-symlink convenience file.
            if [ -L "$f" ]; then continue; fi
            sha256sum "$f" >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt

      - name: Determine prerelease
        id: meta
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tensor-mcp-darwin-arm64
            dist/tensor-mcp-darwin-x64
            dist/tensor-mcp-linux-x64
            dist/tensor-mcp-linux-arm64
            dist/tensor-mcp-windows-x64.exe
            dist/SHA256SUMS.txt
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          fail_on_unmatched_files: true
          generate_release_notes: true
