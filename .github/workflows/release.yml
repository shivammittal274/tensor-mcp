name: release

on:
  push:
    tags:
      - 'v*.*.*'

# Matrix build with NATIVE runners per target.
#
# Why not cross-compile every target from a single Linux runner (the old
# layout)? Bun's `--target=darwin-…` cross-compile from Ubuntu produces a
# darwin binary where dyld can't resolve `@rpath/libonnxruntime…` for the
# bundled onnxruntime-node napi-v3 .node binding at runtime. Result:
# semantic search silently falls back to BM25 on every cross-compiled
# darwin binary we shipped through v0.4.1. Verified empirically: a
# native darwin-arm64 build of the same commit produces a binary where
# semantic ranking fires; the Linux→darwin cross-compiled binary doesn't.
#
# So: each platform builds natively, uploads its binary as an artifact,
# and a final `release` job collects everything + publishes the release.

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
            artifact: tensor-mcp-darwin-arm64
          # darwin-x64 cross-compiled from macos-14 (Apple Silicon) instead
          # of native on macos-13 (Intel). GitHub's free macos-13 pool is
          # exhausted on most runs — jobs queue indefinitely. Trade-off
          # accepted: semantic ranking silently falls back to BM25-only on
          # Intel Macs because Bun's cross-compile doesn't fully fix up the
          # bundled onnxruntime-node native binding. The CLI itself works
          # end-to-end on Intel; only the semantic search ranker degrades.
          - target: darwin-x64
            runner: macos-14
            artifact: tensor-mcp-darwin-x64
          - target: linux-x64
            runner: ubuntu-24.04
            artifact: tensor-mcp-linux-x64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            artifact: tensor-mcp-linux-arm64
          - target: windows-x64
            runner: windows-latest
            artifact: tensor-mcp-windows-x64.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ runner.arch }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build ${{ matrix.target }}
        run: bun run scripts/build.ts --target=${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 1

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten into dist/ + compute SHA256SUMS.txt
        run: |
          set -euo pipefail
          mkdir -p dist
          # Each artifact downloaded as its own directory containing one file.
          find artifacts -type f -exec cp {} dist/ \;
          cd dist
          : > SHA256SUMS.txt
          for f in tensor-mcp-*; do
            if [ -L "$f" ]; then continue; fi
            sha256sum "$f" >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt

      - name: Determine prerelease
        id: meta
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tensor-mcp-darwin-arm64
            dist/tensor-mcp-darwin-x64
            dist/tensor-mcp-linux-x64
            dist/tensor-mcp-linux-arm64
            dist/tensor-mcp-windows-x64.exe
            dist/SHA256SUMS.txt
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          fail_on_unmatched_files: true
          generate_release_notes: true
